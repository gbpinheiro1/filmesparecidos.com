<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,500;1,14..32,500&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poetsen+One&display=swap"
      rel="stylesheet"
    />
    <link
      rel="shortcut icon"
      href="assets/favicon-dark.ico"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="shortcut icon"
      href="assets/favicon-light.ico"
      media="(prefers-color-scheme: light)"
    />
  </head>
  <body>
    <link rel="stylesheet" href="style-page-2.css" />
    <div id="container">
      <header>
        <img src="assets/logo_2.png" alt="" />
      </header>
      <main>
        <div id="character">
          <img
            src="assets/robot_after_selection.png"
            alt="robot after  movie selection"
            srcset=""
            id="robot_sitting"
          />
          <div id="dialogue">
            <img
              src="assets/dialogue_box_2.png"
              alt=""
              srcset=""
              id="dialogue_box"
            />
            <p id="dialogue_text">
              Novato... Uma bela escolha, devo admitir! Aqui estão outros filmes
              que também são <strong>Absolute Cinema</strong> para você
              assistir.
            </p>
          </div>
          <div id="chosen_movie">
            <p id="choice">Você escolheu</p>
            <p id="chosen_movie_name"></p>
            <img src="" alt="" srcset="" id="chosen_movie_poster" />
          </div>
        </div>
        <div id="recommended_films">
          <div class="card"></div>
        </div>
      </main>
    </div>
    <script src="script-page-2.js"></script>
  </body>
</html>
